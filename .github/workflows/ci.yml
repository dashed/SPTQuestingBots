name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Install CSharpier
        run: dotnet tool install --global csharpier

      - name: Run CI
        run: make ci

  sain-contract:
    runs-on: ubuntu-latest
    env:
      QB_SAIN_EXPECTED_VERSION: 4.4.0
      QB_SAIN_EXPECTED_SPT_VERSION: 4.0.0
      QB_SAIN_EXPECTED_BIGBRAIN_VERSION: 1.4.0

    steps:
      - uses: actions/checkout@v5

      - name: Checkout SAIN contract repo
        uses: actions/checkout@v5
        with:
          repository: ArchangelWTF/SAIN
          ref: v4.4.0
          path: external/SAIN

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "9.0.x"

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: ${{ runner.os }}-nuget-

      - name: Run SAIN contract CI
        run: make ci-contract-sain
